name: Sync Files to Another Repo

on:
  push:
    branches:
      - Thyme-DocTestBranch
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            Docs

      - name: Prepare filtered docs
        run: |
          set -e

          mkdir -p temp-dir

          for category in Docs/md/*/; do
            category_name=$(basename "$category")
            mkdir -p "temp-dir/$category_name"
            find "$category" -name '*.md' -exec cp {} "temp-dir/$category_name/" \;
          done

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: AoTTG-2/CustomLogicDocumentation
          token: ${{ secrets.CLDOC }}
          ref: integration
          path: target-repo

      - name: Sync files efficiently (no full delete)
        run: |
          set -e

          mkdir -p target-repo/reference

          # Sync everything except callbacks (preserve it)
          rsync -av --delete \
            --exclude 'callbacks' \
            temp-dir/ target-repo/reference/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Update summary.md
        run: |
          set -e
          python .github/workflows/updateSummary.py target-repo/SUMMARY.md target-repo/reference/

      - name: Commit and push if changed
        run: |
          set -e
          cd target-repo

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected. Workflow passing without commit."
            exit 0
          fi

          git commit -m "Sync .md files from source repo"
          git push origin integration